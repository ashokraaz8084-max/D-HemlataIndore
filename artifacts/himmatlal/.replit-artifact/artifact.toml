kind = "web"
previewPath = "/"
title = "D Himmatlal and Company"
version = "1.0.0"
id = "artifacts/himmatlal"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22409

[services.development]
run = "pnpm --filter @workspace/himmatlal run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/himmatlal", "run", "build" ]
publicDir = "artifacts/himmatlal/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22409"
BASE_PATH = "/"
