openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: D Himmatlal and Company API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: settings
    description: Site settings
  - name: hero
    description: Hero sections
  - name: about
    description: About sections
  - name: categories
    description: Product categories
  - name: products
    description: Products
  - name: gallery
    description: Gallery images
  - name: blogs
    description: Blog posts
  - name: testimonials
    description: Customer testimonials
  - name: contact
    description: Contact details
  - name: inquiries
    description: Customer inquiries
  - name: auth
    description: Admin authentication

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /settings:
    get:
      operationId: getSettings
      tags: [settings]
      summary: Get site settings
      responses:
        "200":
          description: Site settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SiteSettings"
    put:
      operationId: updateSettings
      tags: [settings]
      summary: Update site settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SiteSettingsInput"
      responses:
        "200":
          description: Updated settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SiteSettings"

  /hero:
    get:
      operationId: getHero
      tags: [hero]
      summary: Get hero section
      responses:
        "200":
          description: Hero section
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HeroSection"
    put:
      operationId: updateHero
      tags: [hero]
      summary: Update hero section
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HeroSectionInput"
      responses:
        "200":
          description: Updated hero
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HeroSection"

  /about:
    get:
      operationId: getAbout
      tags: [about]
      summary: Get about section
      responses:
        "200":
          description: About section
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AboutSection"
    put:
      operationId: updateAbout
      tags: [about]
      summary: Update about section
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AboutSectionInput"
      responses:
        "200":
          description: Updated about
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AboutSection"

  /categories:
    get:
      operationId: getCategories
      tags: [categories]
      summary: List all categories
      parameters:
        - name: activeOnly
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: List of categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"
    post:
      operationId: createCategory
      tags: [categories]
      summary: Create a category
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CategoryInput"
      responses:
        "201":
          description: Created category
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"

  /categories/{id}:
    get:
      operationId: getCategory
      tags: [categories]
      summary: Get a category by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Category
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
    put:
      operationId: updateCategory
      tags: [categories]
      summary: Update a category
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CategoryInput"
      responses:
        "200":
          description: Updated category
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
    delete:
      operationId: deleteCategory
      tags: [categories]
      summary: Delete a category
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /products:
    get:
      operationId: getProducts
      tags: [products]
      summary: List products
      parameters:
        - name: categoryId
          in: query
          schema:
            type: integer
        - name: featured
          in: query
          schema:
            type: boolean
        - name: activeOnly
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: List of products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"
    post:
      operationId: createProduct
      tags: [products]
      summary: Create a product
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductInput"
      responses:
        "201":
          description: Created product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"

  /products/{id}:
    get:
      operationId: getProduct
      tags: [products]
      summary: Get a product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
    put:
      operationId: updateProduct
      tags: [products]
      summary: Update a product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductInput"
      responses:
        "200":
          description: Updated product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
    delete:
      operationId: deleteProduct
      tags: [products]
      summary: Delete a product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /gallery:
    get:
      operationId: getGallery
      tags: [gallery]
      summary: List gallery images
      responses:
        "200":
          description: Gallery images
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GalleryImage"
    post:
      operationId: createGalleryImage
      tags: [gallery]
      summary: Add a gallery image
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GalleryImageInput"
      responses:
        "201":
          description: Created gallery image
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GalleryImage"

  /gallery/{id}:
    put:
      operationId: updateGalleryImage
      tags: [gallery]
      summary: Update a gallery image
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GalleryImageInput"
      responses:
        "200":
          description: Updated gallery image
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GalleryImage"
    delete:
      operationId: deleteGalleryImage
      tags: [gallery]
      summary: Delete a gallery image
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /blogs:
    get:
      operationId: getBlogs
      tags: [blogs]
      summary: List blog posts
      parameters:
        - name: activeOnly
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: Blog posts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Blog"
    post:
      operationId: createBlog
      tags: [blogs]
      summary: Create a blog post
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BlogInput"
      responses:
        "201":
          description: Created blog
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Blog"

  /blogs/{id}:
    get:
      operationId: getBlog
      tags: [blogs]
      summary: Get a blog post
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Blog post
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Blog"
    put:
      operationId: updateBlog
      tags: [blogs]
      summary: Update a blog post
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BlogInput"
      responses:
        "200":
          description: Updated blog
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Blog"
    delete:
      operationId: deleteBlog
      tags: [blogs]
      summary: Delete a blog post
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /testimonials:
    get:
      operationId: getTestimonials
      tags: [testimonials]
      summary: List testimonials
      parameters:
        - name: activeOnly
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: Testimonials
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Testimonial"
    post:
      operationId: createTestimonial
      tags: [testimonials]
      summary: Create a testimonial
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TestimonialInput"
      responses:
        "201":
          description: Created testimonial
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Testimonial"

  /testimonials/{id}:
    put:
      operationId: updateTestimonial
      tags: [testimonials]
      summary: Update a testimonial
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TestimonialInput"
      responses:
        "200":
          description: Updated testimonial
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Testimonial"
    delete:
      operationId: deleteTestimonial
      tags: [testimonials]
      summary: Delete a testimonial
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /contact:
    get:
      operationId: getContact
      tags: [contact]
      summary: Get contact details
      responses:
        "200":
          description: Contact details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContactDetails"
    put:
      operationId: updateContact
      tags: [contact]
      summary: Update contact details
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContactDetailsInput"
      responses:
        "200":
          description: Updated contact
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContactDetails"

  /inquiries:
    get:
      operationId: getInquiries
      tags: [inquiries]
      summary: List all inquiries (admin)
      responses:
        "200":
          description: Inquiries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Inquiry"
    post:
      operationId: createInquiry
      tags: [inquiries]
      summary: Submit a contact/product inquiry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InquiryInput"
      responses:
        "201":
          description: Inquiry submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Inquiry"

  /inquiries/{id}:
    delete:
      operationId: deleteInquiry
      tags: [inquiries]
      summary: Delete an inquiry
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /auth/login:
    post:
      operationId: adminLogin
      tags: [auth]
      summary: Admin login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Unauthorized

  /auth/logout:
    post:
      operationId: adminLogout
      tags: [auth]
      summary: Admin logout
      responses:
        "200":
          description: Logged out

  /auth/me:
    get:
      operationId: getAdminMe
      tags: [auth]
      summary: Get current admin session
      responses:
        "200":
          description: Current admin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Not authenticated

  /dashboard/stats:
    get:
      operationId: getDashboardStats
      tags: [auth]
      summary: Get admin dashboard stats
      responses:
        "200":
          description: Dashboard statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    SiteSettings:
      type: object
      properties:
        id: { type: integer }
        businessName: { type: string }
        logoText: { type: string }
        logoImageUrl: { type: ["string", "null"] }
        phone: { type: string }
        email: { type: string }
        address: { type: string }
        whatsappNumber: { type: string }
        facebookUrl: { type: ["string", "null"] }
        instagramUrl: { type: ["string", "null"] }
        youtubeUrl: { type: ["string", "null"] }
        footerText: { type: string }
        createdAt: { type: string }
        updatedAt: { type: string }
      required: [id, businessName, logoText, phone, email, address, whatsappNumber, footerText, createdAt, updatedAt]

    SiteSettingsInput:
      type: object
      properties:
        businessName: { type: string }
        logoText: { type: string }
        logoImageUrl: { type: ["string", "null"] }
        phone: { type: string }
        email: { type: string }
        address: { type: string }
        whatsappNumber: { type: string }
        facebookUrl: { type: ["string", "null"] }
        instagramUrl: { type: ["string", "null"] }
        youtubeUrl: { type: ["string", "null"] }
        footerText: { type: string }
      required: [businessName, logoText, phone, email, address, whatsappNumber, footerText]

    HeroSection:
      type: object
      properties:
        id: { type: integer }
        heading: { type: string }
        subheading: { type: string }
        primaryButtonText: { type: string }
        primaryButtonLink: { type: string }
        secondaryButtonText: { type: ["string", "null"] }
        secondaryButtonLink: { type: ["string", "null"] }
        backgroundImageUrl: { type: ["string", "null"] }
        createdAt: { type: string }
        updatedAt: { type: string }
      required: [id, heading, subheading, primaryButtonText, primaryButtonLink, createdAt, updatedAt]

    HeroSectionInput:
      type: object
      properties:
        heading: { type: string }
        subheading: { type: string }
        primaryButtonText: { type: string }
        primaryButtonLink: { type: string }
        secondaryButtonText: { type: ["string", "null"] }
        secondaryButtonLink: { type: ["string", "null"] }
        backgroundImageUrl: { type: ["string", "null"] }
      required: [heading, subheading, primaryButtonText, primaryButtonLink]

    AboutSection:
      type: object
      properties:
        id: { type: integer }
        businessStory: { type: string }
        founderName: { type: string }
        legacyText: { type: string }
        yearsOfExperience: { type: integer }
        imageUrl: { type: ["string", "null"] }
        founderImageUrl: { type: ["string", "null"] }
        createdAt: { type: string }
        updatedAt: { type: string }
      required: [id, businessStory, founderName, legacyText, yearsOfExperience, createdAt, updatedAt]

    AboutSectionInput:
      type: object
      properties:
        businessStory: { type: string }
        founderName: { type: string }
        legacyText: { type: string }
        yearsOfExperience: { type: integer }
        imageUrl: { type: ["string", "null"] }
        founderImageUrl: { type: ["string", "null"] }
      required: [businessStory, founderName, legacyText, yearsOfExperience]

    Category:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        slug: { type: string }
        description: { type: ["string", "null"] }
        imageUrl: { type: ["string", "null"] }
        displayOrder: { type: integer }
        isActive: { type: boolean }
        createdAt: { type: string }
        updatedAt: { type: string }
      required: [id, name, slug, displayOrder, isActive, createdAt, updatedAt]

    CategoryInput:
      type: object
      properties:
        name: { type: string }
        slug: { type: string }
        description: { type: ["string", "null"] }
        imageUrl: { type: ["string", "null"] }
        displayOrder: { type: integer }
        isActive: { type: boolean }
      required: [name, slug, displayOrder, isActive]

    Product:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        slug: { type: string }
        categoryId: { type: integer }
        categoryName: { type: ["string", "null"] }
        shortDescription: { type: ["string", "null"] }
        fullDescription: { type: ["string", "null"] }
        price: { type: ["string", "null"] }
        contactForPrice: { type: boolean }
        imageUrl: { type: ["string", "null"] }
        galleryImages: { type: ["string", "null"] }
        fabric: { type: ["string", "null"] }
        size: { type: ["string", "null"] }
        color: { type: ["string", "null"] }
        inStock: { type: boolean }
        isFeatured: { type: boolean }
        isActive: { type: boolean }
        createdAt: { type: string }
        updatedAt: { type: string }
      required: [id, name, slug, categoryId, contactForPrice, inStock, isFeatured, isActive, createdAt, updatedAt]

    ProductInput:
      type: object
      properties:
        name: { type: string }
        slug: { type: string }
        categoryId: { type: integer }
        shortDescription: { type: ["string", "null"] }
        fullDescription: { type: ["string", "null"] }
        price: { type: ["string", "null"] }
        contactForPrice: { type: boolean }
        imageUrl: { type: ["string", "null"] }
        galleryImages: { type: ["string", "null"] }
        fabric: { type: ["string", "null"] }
        size: { type: ["string", "null"] }
        color: { type: ["string", "null"] }
        inStock: { type: boolean }
        isFeatured: { type: boolean }
        isActive: { type: boolean }
      required: [name, slug, categoryId, contactForPrice, inStock, isFeatured, isActive]

    GalleryImage:
      type: object
      properties:
        id: { type: integer }
        title: { type: ["string", "null"] }
        imageUrl: { type: string }
        category: { type: ["string", "null"] }
        displayOrder: { type: integer }
        createdAt: { type: string }
      required: [id, imageUrl, displayOrder, createdAt]

    GalleryImageInput:
      type: object
      properties:
        title: { type: ["string", "null"] }
        imageUrl: { type: string }
        category: { type: ["string", "null"] }
        displayOrder: { type: integer }
      required: [imageUrl, displayOrder]

    Blog:
      type: object
      properties:
        id: { type: integer }
        title: { type: string }
        slug: { type: string }
        content: { type: string }
        imageUrl: { type: ["string", "null"] }
        category: { type: ["string", "null"] }
        publishedDate: { type: ["string", "null"] }
        isActive: { type: boolean }
        createdAt: { type: string }
        updatedAt: { type: string }
      required: [id, title, slug, content, isActive, createdAt, updatedAt]

    BlogInput:
      type: object
      properties:
        title: { type: string }
        slug: { type: string }
        content: { type: string }
        imageUrl: { type: ["string", "null"] }
        category: { type: ["string", "null"] }
        publishedDate: { type: ["string", "null"] }
        isActive: { type: boolean }
      required: [title, slug, content, isActive]

    Testimonial:
      type: object
      properties:
        id: { type: integer }
        customerName: { type: string }
        review: { type: string }
        rating: { type: integer }
        imageUrl: { type: ["string", "null"] }
        isActive: { type: boolean }
        createdAt: { type: string }
        updatedAt: { type: string }
      required: [id, customerName, review, rating, isActive, createdAt, updatedAt]

    TestimonialInput:
      type: object
      properties:
        customerName: { type: string }
        review: { type: string }
        rating: { type: integer }
        imageUrl: { type: ["string", "null"] }
        isActive: { type: boolean }
      required: [customerName, review, rating, isActive]

    ContactDetails:
      type: object
      properties:
        id: { type: integer }
        address: { type: string }
        phone: { type: string }
        email: { type: string }
        whatsappNumber: { type: string }
        googleMapEmbed: { type: ["string", "null"] }
        businessHours: { type: ["string", "null"] }
        createdAt: { type: string }
        updatedAt: { type: string }
      required: [id, address, phone, email, whatsappNumber, createdAt, updatedAt]

    ContactDetailsInput:
      type: object
      properties:
        address: { type: string }
        phone: { type: string }
        email: { type: string }
        whatsappNumber: { type: string }
        googleMapEmbed: { type: ["string", "null"] }
        businessHours: { type: ["string", "null"] }
      required: [address, phone, email, whatsappNumber]

    Inquiry:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        email: { type: string }
        phone: { type: ["string", "null"] }
        message: { type: string }
        productId: { type: ["integer", "null"] }
        productName: { type: ["string", "null"] }
        type: { type: string }
        createdAt: { type: string }
      required: [id, name, email, message, type, createdAt]

    InquiryInput:
      type: object
      properties:
        name: { type: string }
        email: { type: string }
        phone: { type: ["string", "null"] }
        message: { type: string }
        productId: { type: ["integer", "null"] }
        productName: { type: ["string", "null"] }
        type: { type: string }
      required: [name, email, message, type]

    LoginInput:
      type: object
      properties:
        email: { type: string }
        password: { type: string }
      required: [email, password]

    AuthResponse:
      type: object
      properties:
        email: { type: string }
        token: { type: string }
      required: [email, token]

    DashboardStats:
      type: object
      properties:
        totalProducts: { type: integer }
        totalCategories: { type: integer }
        totalInquiries: { type: integer }
        totalBlogs: { type: integer }
        totalTestimonials: { type: integer }
        totalGalleryImages: { type: integer }
        recentInquiries: 
          type: array
          items:
            $ref: "#/components/schemas/Inquiry"
      required: [totalProducts, totalCategories, totalInquiries, totalBlogs, totalTestimonials, totalGalleryImages, recentInquiries]
